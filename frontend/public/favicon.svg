<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <!-- Brand Gradient (Emerald -> Teal -> Indigo) -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="50%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>

    <!-- Glowing Drop Shadow -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#06B6D4" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Premium Squircle Background -->
  <rect x="24" y="24" width="464" height="464" rx="136" fill="url(#bgGrad)" stroke="#1E293B" stroke-width="8" filter="url(#glow)" />
  <rect x="24" y="24" width="464" height="464" rx="136" stroke="url(#brandGrad)" stroke-width="4" stroke-opacity="0.6" />

  <!-- Futuristic Geometric 'S' and 'K' Lettermark -->
  <g stroke="url(#brandGrad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round">
    <!-- Letter S -->
    <path d="M 215 175 C 215 135, 125 135, 125 185 C 125 235, 215 245, 215 295 C 215 345, 125 345, 125 305" />
    <!-- Letter K -->
    <path d="M 295 145 L 295 367" />
    <path d="M 387 145 L 305 256 L 387 367" />
  </g>
</svg>